version: '3.8'

services:
  # RUST CORE ENGINE (Port 8041)
  pentaract-rust:
    container_name: pentaract_rust
    build:
      context: ./pentaract
    ports:
      - "8041:8000"
    env_file: .env
    restart: always

  # GO BACKEND BRIDGE (Port 8040)
  pentaract-bridge:
    container_name: pentaract_bridge
    build:
      context: ./backend
    ports:
      - "8040:8040"
    env_file: .env
    depends_on:
      - pentaract-rust
    environment:
      - PENTARACT_API_URL=http://pentaract_rust:8000/api
    restart: always

networks:
  default:
    name: pentaract-network
